<div id="giscus-container"></div>

<script>
  function getGiscusTheme() {
    return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
  }

  function loadGiscus() {
    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'baojiliu/baojiliu.github.io');
    script.setAttribute('data-repo-id', 'R_kgDOSDSHTg');
    script.setAttribute('data-category', 'General');
    script.setAttribute('data-category-id', 'DIC_kwDOSDSHTs4C65Zh');
    script.setAttribute('data-mapping', 'pathname');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '0');
    script.setAttribute('data-input-position', 'bottom');
    script.setAttribute('data-theme', getGiscusTheme());
    script.setAttribute('data-lang', 'zh-CN');
    script.setAttribute('data-loading', 'lazy');
    script.crossOrigin = 'anonymous';
    script.async = true;
    document.getElementById('giscus-container').appendChild(script);
  }

  function setGiscusTheme() {
    const iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme: getGiscusTheme() } } },
      'https://giscus.app'
    );
  }

  loadGiscus();

  // Watch for PaperMod theme toggle (changes data-theme on <html>)
  new MutationObserver(setGiscusTheme)
    .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
</script>
