baseURL = "https://baojiliu.github.io/"
languageCode = "en-us"
title = "Baojiliu's Blog"
theme = "PaperMod"
paginate = 5

[params]
  env = "production"
  defaultTheme = "auto"
  DateFormat = "2006-01-02 15:04"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = true

  [params.homeInfoParams]
    Title = "Welcome"
    Content = "A personal blog"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/baojiliu"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:baoji.liu@gmail.com"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 5
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 15

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
